name: Publish Versioned Docs

on:
  push:
    branches:
      - main          # Trigger 1: PR merged / Push to main (Deploys 'dev')
    tags:
      - 'v*'          # Trigger 2: Stable tag created (Deploys 'latest')
      - '!*rc*'       
      - '!*alpha*'    
      - '!*beta*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: 'pyproject.toml'

      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[docs]

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Docs
        run: |
          # $GITHUB_REF_TYPE tells us if this was triggered by a 'branch' or a 'tag'
          # $GITHUB_REF_NAME gives us the branch name ('main') or tag name ('v2.4.0')
          
          git fetch origin gh-pages || true
          
          if [ "$GITHUB_REF_TYPE" == "branch" ]; then
            echo "Deploying dev version from main branch..."
            # Deploy to the 'dev' folder with the title "Development"
            mike deploy --push dev -t "Development"
            
          elif [ "$GITHUB_REF_TYPE" == "tag" ]; then
            TAG=$GITHUB_REF_NAME
            echo "Starting stable deployment for $TAG..."

            # 1. Fetch versions.json safely
            git checkout origin/gh-pages -- versions.json 2>/dev/null || echo "[]" > versions.json
            
            # 2. Identify the previous version holding the 'latest' alias
            PREV_LATEST=$(jq -r '.[] | select(.aliases != null) | select(.aliases[] == "latest") | .version' versions.json)
            
            # 3. Strip "(latest)" suffix from the previous version
            if [ -n "$PREV_LATEST" ] && [ "$PREV_LATEST" != "null" ] && [ "$PREV_LATEST" != "$TAG" ]; then
              echo "Removing latest suffix from $PREV_LATEST..."
              mike retitle $PREV_LATEST $PREV_LATEST
            fi
            
            # 4. Deploy the new tag as latest
            echo "Deploying $TAG as the new latest..."
            mike deploy --push --update-aliases $TAG latest -t "$TAG (latest)"
            mike set-default --push latest
          fi